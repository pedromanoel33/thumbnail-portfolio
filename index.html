<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Portfolio | Design Moderno</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <!-- Hero Section -->
        <section class="hero" id="home">
            <div class="container hero-container">
                <div class="hero-image">
                    <div class="profile-frame">
                        <img src="images/profile-icon.webp" alt="Foto de Perfil">
                    </div>
                </div>
                <div class="hero-content">
                    <h1>Olá, eu sou o <span class="accent">Designer</span></h1>
                    <p>Especialista em criar layouts modernos e experiências visuais impactantes. Transformo ideias em
                        designs memoráveis com foco em estética e funcionalidade.</p>
                </div>
            </div>
        </section>

        <!-- Projects Section -->
        <section class="projects" id="projects">
            <div class="container">
                <h2>Meus Projetos</h2>
                <h3>Canal Jean Kleemann | Marketing Jurídico</h3>

                <div class="projects-grid">
                    <div class="project-item">
                        <img src="images/pareca-caro.webp" alt="Pareça Caro">
                    </div>
                    <div class="project-item">
                        <img src="images/novo-cliente-24h.webp" alt="Novo Cliente 24h">
                    </div>
                    <div class="project-item">
                        <img src="images/advogando-agro.webp" alt="Advogando no Agro">
                    </div>
                    <div class="project-item">
                        <img src="images/cliente-sumiu.webp" alt="Cliente Sumiu">
                    </div>
                    <div class="project-item">
                        <img src="images/honorário-broxante.webp" alt="Honorário Broxante">
                    </div>
                    <div class="project-item">
                        <img src="images/90%-dos-advogados.webp" alt="90% dos advogados">
                    </div>
                    <div class="project-item">
                        <img src="images/isso-não-funciona-mais.webp" alt="Isso não funciona mais">
                    </div>
                    <div class="project-item">
                        <img src="images/programa-aceleração-jurídica.webp" alt="Programa Aceleração Jurídica">
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
