<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Portfolio | Pedro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <main>
        <!-- Hero Section -->
        <section class="hero" id="home">
            <div class="container hero-container">
                <div class="hero-image">
                    <div class="profile-frame">
                        <img src="images/profile draw.jpg" alt="Pedro">
                    </div>
                </div>
                <div class="hero-content">
                    <h1>Hi :) I'm <span class="accent">Pedro.</span></h1>
                    <p>I'm a professional thumbmaker with over 2 years of experience turning scrollers into viewers. I
                        craft high-impact thumbnails that actually get clicks and grow channels. I'd love to work with
                        you!</p>

                    <!-- Speed Dial Contact -->
                    <div class="speed-dial-container">
                        <button class="main-dial-btn" id="mainDial">
                            <span>Let's Talk</span>
                            <i class="fa-solid fa-message btn-icon"></i>
                        </button>
                        <div class="dial-options">
                            <a href="mailto:pedromanoelmcr@gmail.com" class="dial-btn" title="Email">
                                <i class="fa-solid fa-envelope"></i>
                            </a>
                            <a href="https://x.com/pedro4thumbs" target="_blank" class="dial-btn" title="X / Twitter">
                                <i class="fa-brands fa-x-twitter"></i>
                            </a>
                            <button class="dial-btn" id="copyDiscord" title="Copy Discord ID">
                                <i class="fa-brands fa-discord"></i>
                                <span class="tooltip" id="discordTooltip">Copied!</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Projects Section -->
        <section class="projects" id="projects">
            <div class="container">
                <h2>Meus Projetos</h2>
                <h3>Canal Jean Kleemann | Marketing Jurídico</h3>

                <div class="projects-grid">
                    <div class="project-item">
                        <img src="images/pareca-caro.webp" alt="Pareça Caro">
                    </div>
                    <div class="project-item">
                        <img src="images/novo-cliente-24h.webp" alt="Novo Cliente 24h">
                    </div>
                    <div class="project-item">
                        <img src="images/advogando-agro.webp" alt="Advogando no Agro">
                    </div>
                    <div class="project-item">
                        <img src="images/cliente-sumiu.webp" alt="Cliente Sumiu">
                    </div>
                    <div class="project-item">
                        <img src="images/honorário-broxante.webp" alt="Honorário Broxante">
                    </div>
                    <div class="project-item">
                        <img src="images/90%-dos-advogados.webp" alt="90% dos advogados">
                    </div>
                    <div class="project-item">
                        <img src="images/isso-não-funciona-mais.webp" alt="Isso não funciona mais">
                    </div>
                    <div class="project-item">
                        <img src="images/programa-aceleração-jurídica.webp" alt="Programa Aceleração Jurídica">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Discord Copy Logic
        const copyBtn = document.getElementById('copyDiscord');
        const tooltip = document.getElementById('discordTooltip');
        const discordId = 'pedro.7911';

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(discordId).then(() => {
                tooltip.classList.add('show');
                setTimeout(() => {
                    tooltip.classList.remove('show');
                }, 2000);
            });
        });

        // Speed Dial Toggle for Mobile (Optional click support)
        const mainDial = document.getElementById('mainDial');
        const dialContainer = document.querySelector('.speed-dial-container');

        mainDial.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                dialContainer.classList.toggle('active');
            }
        });
    </script>
</body>

</html>
