<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Portfolio | Pedro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <main>
        <!-- Hero Section -->
        <section class="hero" id="home">
            <div class="container hero-container">
                <div class="hero-image">
                    <div class="profile-frame">
                        <img src="images/profile draw.jpg" alt="Pedro">
                    </div>
                </div>
                <div class="hero-content">
                    <h1>Hi :) I'm <span class="accent">Pedro.</span></h1>
                    <p>I'm a professional thumbmaker with over 2 years of experience turning scrollers into viewers. I
                        craft high-impact thumbnails that actually get clicks and grow channels. I'd love to work with
                        you!</p>

                    <!-- Speed Dial Contact -->
                    <div class="speed-dial-container">
                        <button class="main-dial-btn" id="mainDial">
                            <span>Let's Talk</span>
                            <i class="fa-solid fa-message btn-icon"></i>
                        </button>
                        <div class="dial-options">
                            <button class="dial-btn" id="copyEmail" title="Copy Email">
                                <i class="fa-solid fa-envelope"></i>
                                <span class="tooltip" id="emailTooltip">Copied!</span>
                            </button>
                            <a href="https://x.com/pedro4thumbs" target="_blank" class="dial-btn" title="X / Twitter">
                                <i class="fa-brands fa-x-twitter"></i>
                            </a>
                            <button class="dial-btn" id="copyDiscord" title="Copy Discord ID">
                                <i class="fa-brands fa-discord"></i>
                                <span class="tooltip" id="discordTooltip">Copied!</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Projects Section -->
        <section class="projects" id="projects">
            <div class="container">
                <h2>Meus Projetos</h2>
                <p class="projects-subtitle">Channels I've worked with</p>

                <!-- Project Tabs Navigation -->
                <div class="projects-tabs">
                    <button class="tab-btn active" data-target="jean">
                        <img src="images/logo-jean.jpg" alt="Jean Kleemann Logo">
                        <span>Jean Kleemann | Marketing Jurídico</span>
                    </button>
                    <button class="tab-btn" data-target="jesus">
                        <img src="images/logo-jesus.webp" alt="Jesus Logo">
                        <span>follow Jesus</span>
                    </button>
                </div>

                <!-- Portfolio Grids -->
                <div id="jean" class="portfolio-grid active-grid">
                    <div class="project-item">
                        <img src="images/pareca-caro.webp" alt="Pareça Caro">
                    </div>
                    <div class="project-item">
                        <img src="images/novo-cliente-24h.webp" alt="Novo Cliente 24h">
                    </div>
                    <div class="project-item">
                        <img src="images/advogando-agro.webp" alt="Advogando no Agro">
                    </div>
                    <div class="project-item">
                        <img src="images/cliente-sumiu.webp" alt="Cliente Sumiu">
                    </div>
                    <div class="project-item">
                        <img src="images/honorário-broxante.webp" alt="Honorário Broxante">
                    </div>
                    <div class="project-item">
                        <img src="images/90%-dos-advogados.webp" alt="90% dos advogados">
                    </div>
                    <div class="project-item">
                        <img src="images/isso-não-funciona-mais.webp" alt="Isso não funciona mais">
                    </div>
                    <div class="project-item">
                        <img src="images/programa-aceleração-jurídica.webp" alt="Programa Aceleração Jurídica">
                    </div>
                </div>

                <div id="jesus" class="portfolio-grid hidden-grid">
                    <div class="project-item">
                        <img src="images/jesus-thumb1.webp" alt="Projeto Jesus 1">
                    </div>
                    <div class="project-item">
                        <img src="images/jesus-thumb2.webp" alt="Projeto Jesus 2">
                    </div>
                </div>
            </div>
    </main>

    <!-- Floating Action Menu (FAM) - Root Level -->
    <div class="fam-container" id="famContainer">
        <div class="fam-options">
            <button class="fam-btn" id="famCopyEmail" title="Copy Email">
                <i class="fa-solid fa-envelope"></i>
                <span class="tooltip" id="famEmailTooltip">Copied!</span>
            </button>
            <a href="https://x.com/pedro4thumbs" target="_blank" class="fam-btn" title="X / Twitter">
                <i class="fa-brands fa-x-twitter"></i>
            </a>
            <button class="fam-btn" id="famCopyDiscord" title="Copy Discord ID">
                <i class="fa-brands fa-discord"></i>
                <span class="tooltip" id="famDiscordTooltip">Copied!</span>
            </button>
        </div>
        <button class="fam-main-btn" id="famMainBtn" title="Contact">
            <i class="fa-solid fa-message"></i>
        </button>
    </div>

    <script>
        // Copy functionality helper with visual feedback
        function setupClipboardCopy(btnId, tooltipId, textToCopy) {
            const btn = document.getElementById(btnId);
            const tooltip = document.getElementById(tooltipId);
            if (!btn || !tooltip) return;

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(textToCopy).then(() => {
                    // Visual feedback
                    btn.classList.add('active-copy');
                    tooltip.classList.add('show');

                    setTimeout(() => {
                        btn.classList.remove('active-copy');
                        tooltip.classList.remove('show');
                    }, 2000); // Increased to 2 seconds
                });
            });
        }

        // Setup Buttons (Hero)
        setupClipboardCopy('copyEmail', 'emailTooltip', 'pedromanoelmcr@gmail.com');
        setupClipboardCopy('copyDiscord', 'discordTooltip', 'pedro.7911');

        // Setup Buttons (FAM)
        setupClipboardCopy('famCopyEmail', 'famEmailTooltip', 'pedromanoelmcr@gmail.com');
        setupClipboardCopy('famCopyDiscord', 'famDiscordTooltip', 'pedro.7911');

        // Speed Dial Toggle for Mobile
        const mainDial = document.getElementById('mainDial');
        const dialContainer = document.querySelector('.speed-dial-container');
        const mainIcon = mainDial ? mainDial.querySelector('i') : null;

        if (mainDial) {
            mainDial.addEventListener('click', (e) => {
                if (window.innerWidth <= 768) {
                    dialContainer.classList.toggle('active');

                    if (mainIcon) {
                        if (dialContainer.classList.contains('active')) {
                            mainIcon.className = 'fa-solid fa-plus btn-icon';
                        } else {
                            mainIcon.className = 'fa-solid fa-message btn-icon';
                        }
                    }
                }
            });
        }

        // Floating Action Menu (FAM) Toggle
        const famMainBtn = document.getElementById('famMainBtn');
        const famContainer = document.getElementById('famContainer');

        if (famMainBtn) {
            famMainBtn.addEventListener('click', () => {
                famContainer.classList.toggle('active');
            });
        }

        // Close FAM when clicking outside
        document.addEventListener('click', (e) => {
            if (famContainer && !famContainer.contains(e.target)) {
                famContainer.classList.remove('active');
            }
        });

        // --- NEW: Project Tabs Logic ---
        const tabBtns = document.querySelectorAll('.tab-btn');
        const grids = document.querySelectorAll('.portfolio-grid');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');

                // Toggle Buttons
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Toggle Grids
                grids.forEach(grid => {
                    grid.classList.add('hidden-grid');
                    grid.classList.remove('active-grid');
                });
                const activeGrid = document.getElementById(targetId);
                activeGrid.classList.remove('hidden-grid');
                activeGrid.classList.add('active-grid');
            });
        });

        // --- NEW: Image Modal (Lightbox) Logic ---
        const modal = document.getElementById('image-modal');
        const modalImg = document.getElementById('modal-content');
        const closeBtn = document.querySelector('.close-modal');
        const thumbnails = document.querySelectorAll('.project-item img');

        thumbnails.forEach(thumb => {
            thumb.addEventListener('click', () => {
                modalImg.src = thumb.src;
                modal.classList.add('modal-visible');
            });
        });

        const closeModal = () => {
            modal.classList.remove('modal-visible');
        };

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>

    <!-- Image Modal (Lightbox) -->
    <div id="image-modal" class="modal-hidden">
        <span class="close-modal">&times;</span>
        <img id="modal-content">
    </div>
</body>

</html>
